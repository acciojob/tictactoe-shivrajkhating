<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffffff;
        }

        .container {
            text-align: center;
            width: 350px;
        }

        h1 {
            font-family: 'Comic Sans MS', 'Marker Felt', sans-serif;
            font-size: 3rem;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* Input Section Styles */
        .input-section div {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        input {
            padding: 8px;
            font-size: 1rem;
            border: 2px solid black;
            width: 200px;
        }

        button#submit {
            margin-top: 20px;
            padding: 10px 40px;
            font-size: 1.2rem;
            background: white;
            border: 2px solid black;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }

        /* Game Section Styles */
        #game-section {
            display: none; /* Hidden initially */
        }

        .message {
            font-size: 1.5rem;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 2px;
            background-color: black;
            border: 2px solid black;
            margin: 0 auto;
        }

        .cell {
            background-color: #FFC0CB; /* Pink background */
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            font-family: 'Comic Sans MS', cursive;
            cursor: pointer;
            user-select: none;
        }

        .cell.winner {
            background-color: #800080; /* Purple background for winner */
            color: black;
        }

        label {
            font-size: 1.2rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Tic Tac Toe</h1>

    <div id="setup-section" class="input-section">
        <div>
            <label for="player-1">Player 1</label>
            <input type="text" id="player-1" placeholder="enter name">
        </div>
        <div>
            <label for="player-2">Player 2</label>
            <input type="text" id="player-2" placeholder="enter name">
        </div>
        <button id="submit">Start Game</button>
    </div>

    <div id="game-section">
        <div class="message"></div>
        <div class="board">
            <div class="cell" id="1"></div>
            <div class="cell" id="2"></div>
            <div class="cell" id="3"></div>
            <div class="cell" id="4"></div>
            <div class="cell" id="5"></div>
            <div class="cell" id="6"></div>
            <div class="cell" id="7"></div>
            <div class="cell" id="8"></div>
            <div class="cell" id="9"></div>
        </div>
    </div>
</div>

<script>
    const submitBtn = document.getElementById('submit');
    const setupSection = document.getElementById('setup-section');
    const gameSection = document.getElementById('game-section');
    const messageDiv = document.querySelector('.message');
    const cells = document.querySelectorAll('.cell');

    let player1 = "";
    let player2 = "";
    let currentPlayer = "";
    let gameActive = true;
    let gameState = ["", "", "", "", "", "", "", "", ""];

    const winningConditions = [
        [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
        [0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
        [0, 4, 8], [2, 4, 6]             // Diagonals
    ];

    submitBtn.addEventListener('click', () => {
        player1 = document.getElementById('player-1').value || "Player 1";
        player2 = document.getElementById('player-2').value || "Player 2";
        
        if (player1 && player2) {
            setupSection.style.display = 'none';
            gameSection.style.display = 'block';
            currentPlayer = player1;
            messageDiv.innerText = `${currentPlayer}, you're up`;
        }
    });

    function handleCellClick(e) {
        const clickedCell = e.target;
        const clickedCellIndex = parseInt(clickedCell.id) - 1;

        if (gameState[clickedCellIndex] !== "" || !gameActive) {
            return;
        }

        gameState[clickedCellIndex] = (currentPlayer === player1) ? "x" : "o";
        clickedCell.innerText = gameState[clickedCellIndex];

        checkWinner();
    }

    function checkWinner() {
        let roundWon = false;
        let winCombo = [];

        for (let i = 0; i < winningConditions.length; i++) {
            const [a, b, c] = winningConditions[i];
            if (gameState[a] && gameState[a] === gameState[b] && gameState[a] === gameState[c]) {
                roundWon = true;
                winCombo = [a, b, c];
                break;
            }
        }

        if (roundWon) {
            messageDiv.innerText = `${currentPlayer}, congratulations you won!`;
            winCombo.forEach(index => {
                document.getElementById((index + 1).toString()).classList.add('winner');
            });
            gameActive = false;
            return;
        }

        let roundDraw = !gameState.includes("");
        if (roundDraw) {
            messageDiv.innerText = "It's a draw!";
            gameActive = false;
            return;
        }

        // Switch turn
        currentPlayer = (currentPlayer === player1) ? player2 : player1;
        messageDiv.innerText = `${currentPlayer}, you're up`;
    }

    cells.forEach(cell => cell.addEventListener('click', handleCellClick));
</script>

</body>
</html>
