<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink-light: #F8BBD0;
    --pink-mid:   #F48FB1;
    --pink-dark:  #E91E8C;
    --purple:     #7B1FA2;
    --purple-dark:#4A148C;
    --ink:        #1a1a1a;
    --bg:         #fff9fb;
  }

  body {
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
  }

  .container {
    width: 100%;
    max-width: 560px;
    padding: 2.5rem 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    font-family: 'Permanent Marker', cursive;
    font-size: 2.8rem;
    letter-spacing: 2px;
    color: var(--ink);
    margin-bottom: 2.2rem;
    text-align: center;
  }

  /* ── Setup Screen ── */
  #setup {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    animation: fadeIn .4s ease;
  }

  .field {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
    width: 100%;
    max-width: 380px;
  }

  .field label {
    font-size: 15px;
    font-weight: 500;
    min-width: 72px;
    color: var(--ink);
  }

  .field input {
    flex: 1;
    height: 42px;
    border: 1.5px solid #ccc;
    border-radius: 6px;
    padding: 0 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--ink);
    background: #fff;
    outline: none;
    transition: border-color .2s;
  }

  .field input:focus { border-color: var(--pink-dark); }
  .field input::placeholder { color: #bbb; }

  #submit {
    margin-top: 10px;
    padding: 11px 56px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
    background: #fff;
    border: 1.5px solid var(--ink);
    border-radius: 6px;
    cursor: pointer;
    transition: background .2s, color .2s;
    letter-spacing: .3px;
  }

  #submit:hover { background: var(--ink); color: #fff; }

  /* ── Game Screen ── */
  #game {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
    animation: fadeIn .4s ease;
  }

  .message {
    font-size: 15px;
    font-weight: 400;
    margin-bottom: 1.4rem;
    color: var(--ink);
    min-height: 22px;
    letter-spacing: .2px;
  }

  /* Board */
  #board {
    display: grid;
    grid-template-columns: repeat(3, 110px);
    grid-template-rows: repeat(3, 110px);
    border: 1.5px solid #333;
  }

  .cell {
    width: 110px;
    height: 110px;
    background: var(--pink-light);
    border: 1px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Permanent Marker', cursive;
    font-size: 2.4rem;
    color: var(--ink);
    cursor: pointer;
    transition: background .15s;
    user-select: none;
  }

  .cell:hover:not(.taken) { background: var(--pink-mid); }
  .cell.taken { cursor: default; }
  .cell.win { background: var(--purple); color: #fff; }

  #play-again {
    margin-top: 1.5rem;
    padding: 9px 30px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    background: #fff;
    border: 1.5px solid var(--ink);
    border-radius: 6px;
    cursor: pointer;
    display: none;
    transition: background .2s, color .2s;
  }

  #play-again:hover { background: var(--ink); color: #fff; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>
<div class="container">

  <h1>Tic Tac Toe</h1>

  <!-- Setup -->
  <div id="setup">
    <div class="field">
      <label for="player-1">Player 1</label>
      <input id="player-1" type="text" placeholder="enter name" />
    </div>
    <div class="field">
      <label for="player-2">Player 2</label>
      <input id="player-2" type="text" placeholder="enter name" />
    </div>
    <button id="submit">Start Game</button>
  </div>

  <!-- Game -->
  <div id="game">
    <div class="message" id="message"></div>
    <div id="board">
      <div class="cell" id="1"></div>
      <div class="cell" id="2"></div>
      <div class="cell" id="3"></div>
      <div class="cell" id="4"></div>
      <div class="cell" id="5"></div>
      <div class="cell" id="6"></div>
      <div class="cell" id="7"></div>
      <div class="cell" id="8"></div>
      <div class="cell" id="9"></div>
    </div>
    <button id="play-again">Play Again</button>
  </div>

</div>

<script>
  const WINS = [
    [1,2,3],[4,5,6],[7,8,9],   // rows
    [1,4,7],[2,5,8],[3,6,9],   // cols
    [1,5,9],[3,5,7]            // diags
  ];

  let players = ['', ''];
  let current = 0;
  let board = {};
  let gameOver = false;

  document.getElementById('submit').addEventListener('click', () => {
    const p1 = document.getElementById('player-1').value.trim() || 'Player 1';
    const p2 = document.getElementById('player-2').value.trim() || 'Player 2';
    players = [p1, p2];
    document.getElementById('setup').style.display = 'none';
    document.getElementById('game').style.display = 'flex';
    startGame();
  });

  function startGame() {
    board = {};
    current = 0;
    gameOver = false;
    document.getElementById('play-again').style.display = 'none';
    document.querySelectorAll('.cell').forEach(cell => {
      cell.textContent = '';
      cell.classList.remove('taken', 'win');
    });
    setMessage(`${players[0]}, you're up`);
  }

  document.querySelectorAll('.cell').forEach(cell => {
    cell.addEventListener('click', () => {
      const id = parseInt(cell.id);
      if (gameOver || board[id]) return;

      const mark = current === 0 ? 'x' : 'o';
      board[id] = mark;
      cell.textContent = mark;
      cell.classList.add('taken');

      const winLine = checkWin(mark);
      if (winLine) {
        gameOver = true;
        winLine.forEach(n => {
          document.getElementById(String(n)).classList.add('win');
        });
        setMessage(`${players[current]}, congratulations you won!`);
        document.getElementById('play-again').style.display = 'inline-block';
        return;
      }

      if (Object.keys(board).length === 9) {
        gameOver = true;
        setMessage("It's a draw!");
        document.getElementById('play-again').style.display = 'inline-block';
        return;
      }

      current = 1 - current;
      setMessage(`${players[current]}, you're up`);
    });
  });

  document.getElementById('play-again').addEventListener('click', startGame);

  function checkWin(mark) {
    for (const line of WINS) {
      if (line.every(n => board[n] === mark)) return line;
    }
    return null;
  }

  function setMessage(msg) {
    document.getElementById('message').textContent = msg;
  }
</script>
</body>
</html>
